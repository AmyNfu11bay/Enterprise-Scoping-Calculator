// ── Data ─────────────────────────────────────────────────────────────────────
const DEFAULT_ASSUMPTIONS = {

  uplifts: { e2eDataWork: 40, e2ePM: 10, e2eTraining: 6, vrmsDataWork: 40, vrmsSeWorkflow: 8, vrmsPM: 10, extendedMigration: 10, multiEntity: 8, customWorkflow: 8, compressedPM: 8, compressedMisc: 3 },
  weights: { e2e: 5, vrms: 5, limitedMigration: 1, extendedMigration: 4, integ1to2: 1, integ3plus: 4, multiEntity: 3, customWorkflow: 3, compressedTimeline: 4 },

    { value: 'tmt', name: 'TMT Fleet Maintenance (Trimble)', fee: 'included' },

const SESSION_TOPICS = [

  { id: 'generalMgmt', name: 'General Management', attendees: 'Ops Leadership, GMs, Finance', category: 'trainingConfig', workflows: 'Shop profile, roles, service orders, reporting, units settings' },

const TIER_DEFAULTS = {
  standard: { discovery: 1, generalMgmt: 4, service: 2, parts: 4, accounting: 4, onsiteLaunch: 0, endUserTraining: 4, liveLaunch: 2, postLaunch: 4 },
  complex:  { discovery: 2, generalMgmt: 8, service: 4, parts: 6, accounting: 6, onsiteLaunch: 1, endUserTraining: 6, liveLaunch: 3, postLaunch: 4 },
  high:     { discovery: 2, generalMgmt: 12, service: 5, parts: 10, accounting: 10, onsiteLaunch: 1, endUserTraining: 10, liveLaunch: 4, postLaunch: 4 },
};
const PER_LOC   = { discovery: 0, generalMgmt: 1, service: 0, parts: 1, accounting: 1, onsiteLaunch: 0, endUserTraining: 1, liveLaunch: 1, postLaunch: 0 };
const PER_BRAND = { discovery: 0.5, generalMgmt: 1, service: 0, parts: 0, accounting: 0, onsiteLaunch: 0, endUserTraining: 0, liveLaunch: 0, postLaunch: 0 };
const AL = { kickOff: 'Kick Off', trainingConfig: 'Training & Config', digitalProcedures: 'Digital Procedures', dataWork: 'Data Work', seWorkflow: 'SE Workflow', misc: 'Misc', postLaunch: 'Post-Launch', projectMgmt: 'Project Mgmt' };
const TL = { standard: 'Standard', complex: 'Complex', high: 'High Complexity' };
const TC = { standard: '#22c55e', complex: '#f59e0b', high: '#CC0000' };

function scoreComplexity(inp, w) {
  let p = 0;
  if (inp.e2e) p += w.e2e; if (inp.vrms) p += w.vrms;
  if (inp.migrationScope === 'limited') p += w.limitedMigration;
  if (inp.migrationScope === 'extended') p += w.extendedMigration;
  if (inp.integrationCount >= 3) p += w.integ3plus; else if (inp.integrationCount >= 1) p += w.integ1to2;
  if (inp.multiEntity) p += w.multiEntity; if (inp.customWorkflow) p += w.customWorkflow;
  if (inp.compressedTimeline) p += w.compressedTimeline;
  return p;
}
function getTier(p, inp, a) { if (inp.e2e || inp.vrms || p > a.tierComplexMax) return 'high'; if (p > a.tierStandardMax) return 'complex'; return 'standard'; }

function calcScope(inp, sess, a) {
  const pts = scoreComplexity(inp, a.weights);
  const sH = {};
  SESSION_TOPICS.forEach(t => { const c = sess[t.id] || 0; const r = a.hrsPerItem[t.category] || 1; sH[t.category] = (sH[t.category] || 0) + c * r; });
  let core = Object.values(sH).reduce((s, h) => s + h, 0);
  const intH = inp.integrationCount * a.integrationHrsPerInteg;
  const onsH = inp.onsiteDays * a.onsiteHrsPerDay;
  let base = core + intH + onsH;
  let uD = [], uT = 0;
  if (inp.e2e) { uD.push({ n: 'E2E Data Work', h: a.uplifts.e2eDataWork }, { n: 'E2E PM', h: a.uplifts.e2ePM }, { n: 'E2E Training', h: a.uplifts.e2eTraining }); uT += a.uplifts.e2eDataWork + a.uplifts.e2ePM + a.uplifts.e2eTraining; }
  if (inp.vrms) { uD.push({ n: 'VRMS Data Work', h: a.uplifts.vrmsDataWork }, { n: 'VRMS SE Workflow', h: a.uplifts.vrmsSeWorkflow }, { n: 'VRMS PM', h: a.uplifts.vrmsPM }); uT += a.uplifts.vrmsDataWork + a.uplifts.vrmsSeWorkflow + a.uplifts.vrmsPM; }
  if (inp.migrationScope === 'extended') { uD.push({ n: 'Extended Migration', h: a.uplifts.extendedMigration }); uT += a.uplifts.extendedMigration; }
  if (inp.multiEntity) { uD.push({ n: 'Multi-Entity / Brand', h: a.uplifts.multiEntity }); uT += a.uplifts.multiEntity; }
  if (inp.customWorkflow) { uD.push({ n: 'Custom Workflow', h: a.uplifts.customWorkflow }); uT += a.uplifts.customWorkflow; }
  if (inp.compressedTimeline) { uD.push({ n: 'Compressed PM', h: a.uplifts.compressedPM }, { n: 'Compressed Misc', h: a.uplifts.compressedMisc }); uT += a.uplifts.compressedPM + a.uplifts.compressedMisc; }
  let sub = base + uT;
  const fl = (inp.e2e || inp.vrms) ? a.minFloorE2eVrms : a.minFloor;
  const af = Math.max(sub, fl); const fA = af > sub;
  const cH = Math.round(af * a.contingency * 10) / 10;
  const tH = Math.round((af + cH) * 10) / 10;
  const alloc = Object.entries(a.alloc).map(([k, pct]) => ({ activity: k, pct, hrs: Math.round(core * pct * 10) / 10 }));
  const dL = []; const sys = inp.sourceSystem ? findSystem(inp.sourceSystem) : null;
  if (inp.dataScope.core4 && inp.locations > 0) dL.push({ name: `Core 4 Import (${inp.locations} loc)`, qty: inp.locations, up: 495, total: inp.locations * 495, sku: 'CX-OB-BDI-1000' });
  if (inp.dataScope.historical && inp.histRecs > 0) { const bl = Math.ceil(inp.histRecs / 3000); dL.push({ name: `Historical Import (${inp.histRecs.toLocaleString()} records)`, qty: 1, up: 995, total: 995, sku: 'CX-DS-HRI-1000' }); if (bl > 1) dL.push({ name: `Add'l Historical (${bl-1} x 3K blocks)`, qty: bl-1, up: 495, total: (bl-1)*495, sku: 'CX-DS-AHR-1000' }); }
  if (inp.dataScope.lastPerformed) dL.push({ name: 'Last Performed Import', qty: 1, up: 495, total: 495, sku: 'CX-DS-LPI-1000' });
  if (inp.dataScope.globalServices) dL.push({ name: 'Global Services Import', qty: 1, up: 180, total: 180, sku: 'CX-DS-GSI-1000' });
  if (inp.dataScope.taxLocations) dL.push({ name: 'Tax Locations Import', qty: 1, up: 180, total: 180, sku: 'CX-DS-TLI-1000' });
  const dC = dL.reduce((s, d) => s + d.total, 0);
  const oC = inp.onsiteDays * a.onsiteRatePerDay; const trv = inp.travelEst || 0;
  const bP = Math.round(tH * a.billRate); const mP = Math.round((tH * a.billRate) / (1 - a.targetMargin));
  const gT = bP + dC + oC + trv; const tS = Object.values(sess).reduce((s, v) => s + v, 0);
  return { pts, tS, core: Math.round(core*10)/10, intH, onsH, base: Math.round(base*10)/10, uD, uT, sub: Math.round(sub*10)/10, fl, af: Math.round(af*10)/10, fA, cH, tH, alloc, dL, dC, dbFee: sys?.fee==='db-fee', noData: sys?.fee==='not-available', sysWarn: sys?.warning, oC, trv, bP, mP, gT };
}

// ── Editable text field (string) ──────────────────────────────────────────────
function EText({ value, onChange, style, dark }) {
  return (
    <input
      type="text"
      value={value}
      onChange={e => onChange(e.target.value)}
      className={'edit-field' + (dark ? ' dark-edit' : '')}
      style={{ ...style }}
    />
  );
}

// ── Editable number field — shows formatted, edits raw ────────────────────────
function ENum({ value, onChange, style, dark, prefix }) {
  const [editing, setEditing] = useState(false);
  const [raw, setRaw] = useState('');
  const onFocus = () => { setRaw(String(value)); setEditing(true); };
  const onBlur = () => { const v = parseFloat(raw.replace(/[^0-9.]/g, '')); if (!isNaN(v)) onChange(v); setEditing(false); };
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:'1px'}}>
      {prefix && <span style={{fontSize:'inherit',color:'inherit'}}>{prefix}</span>}
      <input
        type="text"
        value={editing ? raw : fmt(value)}
        onChange={e => setRaw(e.target.value)}
        onFocus={onFocus}
        onBlur={onBlur}
        className={'edit-field' + (dark ? ' dark-edit' : '')}
        style={{ textAlign: 'right', minWidth: '60px', ...style }}
      />
    </span>
  );
}

            <div style={{fontSize:'11px',color:'#737373'}}>{l}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

    const newTotal = newRows.reduce((s, r) => s + r.count, 0);
    setRState(p => ({...p, sessRows: newRows, tS: newTotal}));
  };

  const addExtraLine = () => {

                <span><span style={{color:'#a3a3a3'}}>Tier: </span><span style={{fontWeight:'700',color:TC[qT]}}>{TL[qT]}</span></span>
                <span><span style={{color:'#a3a3a3'}}>Hrs: </span><span style={{fontWeight:'700'}}>{scope.tH}</span></span>
                <span><span style={{color:'#a3a3a3'}}>Total: </span><span style={{fontWeight:'700',fontSize:'18px'}}>{fmtD(scope.gT)}</span></span>
              </div>
              <button type="button" onClick={goToResults} style={{padding:'10px 24px',background:'#CC0000',color:'#fff',fontWeight:'600',borderRadius:'8px',fontSize:'14px',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:'8px'}}>
                Generate Scope <Icons.ArrowRight />
              </button>
            </div>
          </div>
        )}

        {/* ── RESULTS VIEW ── */}
        {view === 'results' && rState && (() => {
          const gD = genDate.current || new Date();
          const expD = addDays(gD, 30);
          // Compute totals dynamically from current line items
          const liveDC = [...rState.dL, ...rState.extraLines].reduce((s, d) => s + Number(d.total), 0);
          const liveBP = Math.round(Number(rState.tH) * Number(rState.billRate));
          const liveGT = liveBP + liveDC + Number(rState.oC) + Number(rState.trv);
          return (
          <div style={{display:'flex',flexDirection:'column',gap:'24px'}}>

            {/* Edit hint */}
            <div className="no-print edit-hint-bar" style={{padding:'10px 14px',background:'#f0f9ff',border:'1px solid #bae6fd',borderRadius:'8px',fontSize:'12px',color:'#0369a1'}}>
              <strong>Editing mode:</strong> Click any field to edit it directly. Session counts use +/- buttons. Click <strong>Print / Save PDF</strong> when ready.
            </div>

            {/* Estimate banner */}
            <div style={{padding:'12px 16px',background:'#fef9c3',border:'1px solid #fde047',borderRadius:'8px',fontSize:'12px',color:'#713f12',lineHeight:'1.5'}}>
              <strong>This document is an estimate.</strong> All hours and pricing are estimates based on the information provided at time of scoping. Final terms, pricing, and scope are governed by a mutually signed order form. Any changes to scope, timeline, or deliverables must be submitted in writing and approved via Change Order.
            </div>

            {/* Header */}
            <div style={{borderBottom:'2px solid #CC0000',paddingBottom:'16px'}}>
              <div style={{fontSize:'11px',fontWeight:'700',letterSpacing:'0.1em',textTransform:'uppercase',color:'#CC0000',marginBottom:'4px'}}>Enterprise Implementation Scope</div>
              <h1 style={{fontSize:'28px',fontWeight:'700',color:'#171717'}}>
                <EText value={rState.co} onChange={v => upd('co', v)} style={{fontSize:'28px',fontWeight:'700',width:'100%'}} />
              </h1>
              <p style={{fontSize:'14px',color:'#737373',marginTop:'4px',display:'flex',alignItems:'center',flexWrap:'wrap',gap:'4px'}}>
                <EText value={rState.brands} onChange={v => upd('brands', v)} style={{width:'30px',textAlign:'center'}} /> brand{rState.brands!=='1'?'s':''} /&nbsp;
                <EText value={rState.locs} onChange={v => upd('locs', v)} style={{width:'30px',textAlign:'center'}} /> location{rState.locs!=='1'?'s':''} /&nbsp;
                <EText value={rState.intCt} onChange={v => upd('intCt', v)} style={{width:'30px',textAlign:'center'}} /> integration{rState.intCt!=='0'&&rState.intCt!=='1'?'s':''}
                <span className="no-print">&nbsp;/&nbsp;<EText value={rState.tier} onChange={v => upd('tier', v)} style={{width:'120px'}} /></span>
              </p>
            </div>

            {/* KPI cards */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'12px'}}>
              <KC l="Complexity" v={`${rState.pts} pts`} s={rState.tier} c={TC[qT]} />
              <KC l="Sessions" v={rState.tS} />
              <KC l="Scoped Hours" v={rState.tH} />
              <KC l="Services" v={fmtD(liveBP)} s={`$${rState.billRate}/hr`} />
              <KC l="Grand Total" v={fmtD(liveGT)} s="All items" h />
            </div>

            {/* Session Plan */}
            <div>
              <h2 style={{fontSize:'15px',fontWeight:'700',marginBottom:'8px'}}>Session Plan</h2>
              <div style={{border:'1px solid #e5e5e5',borderRadius:'12px',overflow:'hidden'}}>
                <table>
                  <thead><tr style={{background:'#f5f5f5'}}>
                    <th style={{padding:'8px 16px',textAlign:'left',fontWeight:'600'}}>Topic</th>
                    <th style={{padding:'8px 16px',textAlign:'left',fontWeight:'600'}}>Attendees</th>
                    <th style={{padding:'8px 16px',textAlign:'center',fontWeight:'600',width:'110px'}}>Sessions</th>
                  </tr></thead>
                  <tbody>
                    {rState.sessRows.map((t, i) => (
                      <tr key={t.id} style={{borderTop:'1px solid #e5e5e5',background:i%2?'#fafafa':'#fff'}}>
                        <td style={{padding:'8px 16px'}}>
                          <EText value={t.name} onChange={v => { const r=[...rState.sessRows]; r[i]={...t,name:v}; upd('sessRows',r); }} style={{fontWeight:'500',width:'100%'}} />
                        </td>
                        <td style={{padding:'8px 16px',fontSize:'12px'}}>
                          <EText value={t.attendees} onChange={v => { const r=[...rState.sessRows]; r[i]={...t,attendees:v}; upd('sessRows',r); }} style={{fontSize:'12px',width:'100%'}} />
                        </td>
                        <td style={{padding:'8px 16px'}}>
                          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'6px'}}>
                            <button type="button" onClick={() => updSessRow(t.id,-1)} style={{width:'24px',height:'24px',border:'1px solid #e5e5e5',borderRadius:'4px',background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Icons.Minus /></button>
                            <span style={{fontSize:'14px',fontWeight:'700',minWidth:'24px',textAlign:'center'}}>{t.count}</span>
                            <button type="button" onClick={() => updSessRow(t.id,1)} style={{width:'24px',height:'24px',border:'1px solid #e5e5e5',borderRadius:'4px',background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Icons.Plus /></button>
                          </div>
                        </td>
                      </tr>
                    ))}
                    <tr style={{borderTop:'2px solid #d4d4d4',background:'#f5f5f5',fontWeight:'700'}}>
                      <td style={{padding:'8px 16px'}} colSpan={2}>Total</td>
                      <td style={{padding:'8px 16px',textAlign:'center',fontSize:'18px'}}>{rState.tS}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

            {/* Data Services */}
            {(rState.dL.length > 0 || rState.extraLines.length > 0) && (
              <div>
                <h2 style={{fontSize:'15px',fontWeight:'700',marginBottom:'8px'}}>Data Services</h2>
                <div style={{border:'1px solid #e5e5e5',borderRadius:'12px',overflow:'hidden'}}>
                  <table>
                    <thead><tr style={{background:'#f5f5f5'}}>
                      <th style={{padding:'8px 16px',textAlign:'left',fontWeight:'600'}}>Service</th>
                      <th style={{padding:'8px 16px',textAlign:'center',fontWeight:'600',width:'60px'}}>Qty</th>
                      <th style={{padding:'8px 16px',textAlign:'center',fontWeight:'600',width:'90px'}}>Unit Price</th>
                      <th style={{padding:'8px 16px',textAlign:'right',fontWeight:'600',width:'90px'}}>Total</th>
                      <th className="no-print" style={{padding:'8px 8px',width:'32px'}}></th>
                    </tr></thead>
                    <tbody>
                      {rState.dL.map((d, i) => (
                        <tr key={i} style={{borderTop:'1px solid #e5e5e5'}}>
                          <td style={{padding:'8px 16px'}}>
                            <EText value={d.name} onChange={v => { const n=[...rState.dL]; n[i]={...d,name:v}; upd('dL',n); }} style={{width:'100%'}} />
                            <div style={{fontSize:'11px',color:'#a3a3a3'}}>{d.sku}</div>
                          </td>
                          <td style={{padding:'8px 16px',textAlign:'center'}}><ENum value={d.qty} onChange={v => { const n=[...rState.dL]; n[i]={...d,qty:v,total:Math.round(v*d.up)}; upd('dL',n); }} style={{width:'40px'}} /></td>
                          <td style={{padding:'8px 16px',textAlign:'center'}}><ENum value={d.up} onChange={v => { const n=[...rState.dL]; n[i]={...d,up:v,total:Math.round(d.qty*v)}; upd('dL',n); }} prefix="$" style={{width:'60px'}} /></td>
                          <td style={{padding:'8px 16px',textAlign:'right',fontWeight:'500'}}><ENum value={d.total} onChange={v => { const n=[...rState.dL]; n[i]={...d,total:v}; upd('dL',n); }} prefix="$" style={{width:'60px'}} /></td>
                          <td className="no-print" style={{padding:'8px 8px',textAlign:'center'}}></td>
                        </tr>
                      ))}
                      {rState.extraLines.map((l) => (
                        <tr key={l.id} style={{borderTop:'1px solid #e5e5e5',background:'#fffbeb'}}>
                          <td style={{padding:'8px 16px'}}>
                            <EText value={l.name} onChange={v => updExtra(l.id,'name',v)} style={{width:'100%'}} />
                            <EText value={l.sku} onChange={v => updExtra(l.id,'sku',v)} style={{fontSize:'11px',color:'#a3a3a3',width:'100%'}} />
                          </td>
                          <td style={{padding:'8px 16px',textAlign:'center'}}><ENum value={l.qty} onChange={v => updExtra(l.id,'qty',v)} style={{width:'40px'}} /></td>
                          <td style={{padding:'8px 16px',textAlign:'center'}}><ENum value={l.up} onChange={v => updExtra(l.id,'up',v)} prefix="$" style={{width:'60px'}} /></td>
                          <td style={{padding:'8px 16px',textAlign:'right',fontWeight:'500'}}><ENum value={l.total} onChange={v => updExtra(l.id,'total',v)} prefix="$" style={{width:'60px'}} /></td>
                          <td className="no-print" style={{padding:'8px 8px',textAlign:'center'}}>
                            <button type="button" onClick={() => removeExtra(l.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#dc2626'}}><Icons.Trash2 /></button>
                          </td>
                        </tr>
                      ))}
                      <tr style={{borderTop:'2px solid #d4d4d4',background:'#f5f5f5',fontWeight:'700'}}>
                        <td style={{padding:'8px 16px'}} colSpan={3}>Data Subtotal</td>
                        <td style={{padding:'8px 16px',textAlign:'right'}}>{fmtD(liveDC)}</td>
                        <td className="no-print"></td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <button type="button" className="no-print" onClick={addExtraLine} style={{marginTop:'8px',padding:'6px 14px',background:'#fff',border:'1px solid #CC0000',color:'#CC0000',borderRadius:'6px',fontSize:'12px',fontWeight:'600',cursor:'pointer',display:'flex',alignItems:'center',gap:'6px'}}>
                  <Icons.Plus /> Add Line Item
                </button>
              </div>
            )}

            {/* If no data services yet, still show add button */}
            {rState.dL.length === 0 && rState.extraLines.length === 0 && (
              <div>
                <h2 style={{fontSize:'15px',fontWeight:'700',marginBottom:'8px'}}>Data Services</h2>
                <button type="button" className="no-print" onClick={addExtraLine} style={{padding:'6px 14px',background:'#fff',border:'1px solid #CC0000',color:'#CC0000',borderRadius:'6px',fontSize:'12px',fontWeight:'600',cursor:'pointer',display:'flex',alignItems:'center',gap:'6px'}}>
                  <Icons.Plus /> Add Line Item
                </button>
              </div>
            )}

            {/* Pricing */}
            <div style={{padding:'20px',background:'#171717',color:'#fff',borderRadius:'12px'}}>
              <h2 style={{fontSize:'12px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'0.05em',color:'#a3a3a3',marginBottom:'12px'}}>Pricing</h2>
              <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:'14px',color:'#a3a3a3'}}>Professional Services (<ENum value={rState.tH} onChange={v => upd('tH',v)} dark style={{width:'50px',color:'#a3a3a3'}} /> hrs x $<ENum value={rState.billRate} onChange={v => upd('billRate',v)} dark style={{width:'45px',color:'#a3a3a3'}} />/hr)</span>
                  <span style={{fontSize:'20px',fontWeight:'900'}}>{fmtD(liveBP)}</span>
                </div>
                {(rState.dC > 0 || rState.extraLines.length > 0) && <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:'14px',color:'#a3a3a3'}}>Data Services</span>
                  <span style={{fontSize:'20px',fontWeight:'900'}}>{fmtD(liveDC)}</span>
                </div>}
                {rState.oC > 0 && <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:'14px',color:'#a3a3a3'}}>Onsite ({rState.onD} day{rState.onD!==1?'s':''})</span>
                  <span style={{fontSize:'20px',fontWeight:'900'}}><ENum value={rState.oC} onChange={v => upd('oC',v)} prefix="$" dark style={{width:'80px',color:'#fff',fontWeight:'900',fontSize:'20px'}} /></span>
                </div>}
                {rState.trv > 0 && <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:'14px',color:'#a3a3a3'}}>Travel (as incurred)</span>
                  <span style={{fontSize:'20px',fontWeight:'900'}}><ENum value={rState.trv} onChange={v => upd('trv',v)} prefix="$" dark style={{width:'80px',color:'#fff',fontWeight:'900',fontSize:'20px'}} /></span>
                </div>}
                <div style={{paddingTop:'12px',borderTop:'1px solid #404040',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{color:'#d4d4d4',fontWeight:'600'}}>Total at Bill Rate</span>
                  <span style={{fontSize:'28px',fontWeight:'900'}}>{fmtD(liveGT)}</span>
                </div>
                <div style={{fontSize:'12px',color:'#737373',lineHeight:'1.5',marginTop:'4px'}}>
                  Any request, change, or circumstance that (i) is outside the Scope of Services or (ii) will require effort beyond the Included Hours will require a mutually executed Change Order, which includes a $200 fee to reopen the Statement of Work, as well as additional fees for the updated cost associated with the change order request. Included Hours are provided as a limit on effort and do not create an entitlement to unused hours or additional services.
                </div>
              </div>
            </div>

            {/* Scope Notes */}
            <div>
              <h2 style={{fontSize:'15px',fontWeight:'700',marginBottom:'8px'}}>Scope Notes</h2>
              <div style={{padding:'12px',background:'#fafafa',border:'1px solid #e5e5e5',borderRadius:'12px'}}>
                <EArea value={rState.notes} onChange={v => upd('notes',v)} placeholder="Click to add scope notes..." style={{fontSize:'14px',minHeight:'60px'}} />
              </div>
            </div>

            {/* Out of Scope */}
            <div style={{padding:'20px',background:'#fafafa',border:'1px solid #e5e5e5',borderRadius:'12px'}}>
              <h2 style={{fontSize:'15px',fontWeight:'700',marginBottom:'4px'}}>Out of Scope</h2>
              <p style={{fontSize:'12px',color:'#737373',marginBottom:'16px'}}>Unless explicitly stated, Fullbay's delivery will not include the following. Many are available through the Fullbay Professional Services catalog.</p>
              <div style={{display:'flex',flexDirection:'column',gap:'8px',fontSize:'13px',color:'#171717'}}>
                {[
                  'Report building, dashboard creation, or custom scripting',
                  'Process documentation, staff communications, or other assets',
                  'End-user training',
                  'Execution of User Acceptance Testing (UAT)',
                  'Help desk services, or user-level troubleshooting',
                  'Custom automation or integration middleware',
                  'Custom software development',
                  'Coordination with Customer vendors or external consultants',
                  '3rd-party licenses or subscriptions required for integrations (e.g., Mitchell1 ProDemand)',
                  'Onsite Support at multiple Customer locations or multiple sites within a 50-mile radius of each other',
                  'Any services beyond those explicitly listed above',
                  'New or additional shop locations',
                ].map((item, i) => (
                  <div key={i} style={{display:'flex',gap:'10px',alignItems:'flex-start'}}>
                    <span style={{color:'#CC0000',fontWeight:'700',flexShrink:0}}>✕</span>
                    <span>{item}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Assumptions & Terms — verbatim from approved SOW */}
            <div style={{padding:'20px',background:'#fafafa',border:'1px solid #e5e5e5',borderRadius:'12px'}}>
              <h2 style={{fontSize:'15px',fontWeight:'700',marginBottom:'16px'}}>Assumptions & Terms</h2>
              <div style={{display:'flex',flexDirection:'column',gap:'14px',fontSize:'13px',color:'#404040',lineHeight:'1.6'}}>
                {[
                  ['1. Customer Responsibilities', 'Customer will provide necessary access, named staff, and appropriate hours to provide needed inputs, ensure solution requirements, test necessary workflows, train end users, and track adoption post-launch. Any delays resulting from Customer resource availability may extend the period of performance. Sessions cancelled with less than 24 hours\' notice may be deducted from the scoped total.'],
                  ['2. Data Imports', 'Fullbay will format and map Customer-provided data into Fullbay\'s standard import templates and may perform limited restructuring required for successful import (e.g., splitting or combining columns to match required fields). This does not include data cleansing, deduplication, correction, reconciliation, or transformation beyond template mapping. Data preparation is limited to the agreed datasets and up to two (2) import iterations per dataset.'],
                  ['3. Integrations & 3rd Party Vendors', 'Fullbay is not responsible for third-party delays, unsupported platforms, or connectivity failures beyond Fullbay\'s control. Integrations not included in the purchased integrations plan (including flat-file exports or custom connectivity) must be separately scoped in writing.'],
                  ['4. Advanced Workflows', 'Unless otherwise stated, complex workflows or advanced configuration of non-standard requirements (e.g., advanced parts pricing, SO schedule workflows, split SO billing, internal PO approval processes, or other specialized processes) are not included in this scope.'],
                  ['5. Place of Performance', 'Fullbay will deliver the above services on Fullbay equipment at Fullbay locations during normal business hours, excluding holidays; unless otherwise stated within the order form.'],
                  ['6. Change Orders', 'Any changes to scope, timeline, deliverables, or resource allocations must be submitted in writing. Fullbay will review change requests and respond within three (3) business days with any impacts to the timeline or pricing. No additional work will proceed without a mutually signed Change Order.'],
                  ['7. Not to Exceed', 'All quantities are estimates and reflect maximum units to be provided by Fullbay under this SOW. Any effort beyond these amounts requires a mutually executed Change Order and will be billed at Fullbay\'s then-current standard rates. Unused sessions or hours expire 90 days after kickoff unless otherwise agreed. Fullbay\'s standard rates are currently: Service Delivery: $180/hr.'],
                  ['8. Acceptance Criteria', 'Deliverables will be deemed accepted upon the earlier of (a) written confirmation by Customer, or (b) five (5) business days following delivery without written notice of material non-conformance. Any remediation will be limited to addressing material deviations from agreed deliverables.'],
                ].map(([title, body]) => (
                  <div key={title}>
                    <div style={{fontWeight:'700',marginBottom:'2px'}}>{title}</div>
                    <div>{body}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Fee Schedule */}
            <div style={{padding:'20px',background:'#fafafa',border:'1px solid #e5e5e5',borderRadius:'12px'}}>
              <h2 style={{fontSize:'15px',fontWeight:'700',marginBottom:'12px'}}>Fee Schedule</h2>
              <div style={{fontSize:'13px',color:'#404040',lineHeight:'1.6'}}>
                <p>Fullbay shall invoice the customer as per the following terms for the agreed upon services.</p>
                <ul style={{marginTop:'8px',paddingLeft:'20px',display:'flex',flexDirection:'column',gap:'4px'}}>
                  <li>50% of the Service Package fee is invoiced upfront when the SOW is executed by the Customer.</li>
                  <li>Remaining 50% of the Service Package fee is invoiced upon completion of the system and data configuration.</li>
                </ul>
              </div>
            </div>

            {/* Signature Block */}
            <div style={{padding:'24px',border:'2px solid #171717',borderRadius:'12px'}}>
              <h2 style={{fontSize:'15px',fontWeight:'700',marginBottom:'4px'}}>Agreement & Signatures</h2>
              <p style={{fontSize:'12px',color:'#737373',marginBottom:'24px'}}>By signing below, both parties agree to the scope, pricing, and terms outlined in this document. Execution via DocuSign is legally binding.</p>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'48px'}}>
                <SigBlock party={rState.co} />
                <SigBlock party="Fullbay, Inc." />
              </div>
            </div>

            {/* Footer */}
            <div style={{padding:'16px',background:'#fafafa',border:'1px solid #e5e5e5',borderRadius:'12px',fontSize:'12px',color:'#737373'}}>
              <p><strong style={{color:'#171717'}}>This document is an estimate.</strong> All hours, sessions, and pricing reflect estimates based on information available at the time of scoping and are subject to change upon final agreement.</p>
              <p style={{marginTop:'6px'}}>Generated: {fmtDate(gD)} &nbsp;|&nbsp; <strong>Expires: {fmtDate(expD)}</strong></p>
              <p style={{marginTop:'4px'}}>Standard Service Delivery rate: $180/hr. Unused sessions expire 90 days after kickoff. Sessions cancelled with less than 24 hours notice may be deducted from the scoped total.</p>
              <p style={{marginTop:'4px'}}>fullbay.com</p>
            </div>

          </div>
          );
        })()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
